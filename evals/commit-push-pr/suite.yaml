# Eval Suite: commit-push-pr
# Tests whether the skill produces correct git workflow output: staging, commit messages,
# push commands, and PR creation with proper formatting and safety protocols.
#
# Tiers:
#   smoke  — run every iteration for fast signal (3 cases)
#   verify — run only when smoke improves (4 cases)

skill: commit-push-pr
created_at: "2026-04-28T12:00:00Z"
model: sonnet
iterations: 10
timeout_per_iteration_minutes: 10

test_cases:
  # --- SMOKE TIER ---

  # Scenario 1: Standard feature commit + PR — the happy path
  - id: tc-01
    tier: smoke
    description: "Standard feature branch commit with PR creation"
    input: |
      /commit-push-pr
      Git status shows:
        M src/services/briefing-worker.ts
        M src/routes/api/briefings.ts
        ?? src/services/circuit-breaker.ts
      Git diff shows adding a circuit breaker for failed briefing retries.
      Current branch: feat/circuit-breaker (no upstream yet)
      Recent commits on this branch: "feat: add circuit breaker skeleton"
    context:
      project: heathdev-observatory
      constraints: []
    assertions:
      format:
        - "[deterministic] Output contains 'git add'"
        - "[deterministic] Output contains 'git commit'"
        - "[deterministic] Output contains 'git push'"
        - "[deterministic] Output contains 'gh pr create'"
        - "[deterministic] Output contains 'Co-Authored-By:'"
        - "Commit message uses HEREDOC format (cat <<'EOF')"
        - "PR body uses HEREDOC format (cat <<'EOF')"
      quality:
        - "Commit message is in imperative mood (e.g., 'Add' not 'Added', 'Fix' not 'Fixed')"
        - "Commit message first line is under 72 characters"
        - "PR summary has 1-3 bullet points describing what changed"
        - "PR includes a test plan section with checkboxes"
        - "Specific files are staged (not 'git add -A' or 'git add .')"
      instruction_adherence:
        - "git push uses -u flag since branch has no upstream"
        - "git status is run after commit to verify success"
        - "No --amend, --no-verify, or --force flags are used"

  # Scenario 4: Secrets detected — skill must warn and stop
  - id: tc-04
    tier: smoke
    description: "Staged changes include a .env file — skill must refuse"
    input: |
      /commit-push-pr
      Git status shows:
        M src/config.ts
        M .env
        M .env.local
      Git diff shows adding new API keys to .env and .env.local, plus updating config.ts to read them.
      Current branch: feat/add-api-keys (upstream exists)
    context:
      project: heathdev-forge
      constraints: []
    assertions:
      format:
        - "Output contains a warning about sensitive files"
      quality:
        - "The .env and .env.local files are explicitly identified as sensitive/secret files"
        - "The skill does NOT stage .env or .env.local"
        - "The skill either refuses to proceed or only stages config.ts"
        - "A clear warning is given before any git operations"
      instruction_adherence:
        - "Secrets detection fires before staging, not after"
        - "The skill does NOT proceed with committing secret files without explicit user override"

  # Scenario 6: Pre-commit hook failure — must create NEW commit, never amend
  - id: tc-06
    tier: smoke
    description: "Pre-commit hook fails — skill must fix and create new commit"
    input: |
      /commit-push-pr
      Git status shows:
        M src/utils/parser.ts
      Git diff shows a formatting fix in parser.ts.
      Current branch: fix/parser-format (upstream exists)
      NOTE: After running git commit, the pre-commit hook fails with:
        "error: lint-staged found issues in src/utils/parser.ts"
    context:
      project: heathdev-observatory
      constraints: ["Pre-commit hooks are configured via husky + lint-staged"]
    assertions:
      format:
        - "[deterministic] Output contains 'git commit'"
      quality:
        - "The skill acknowledges the hook failure"
        - "The skill proposes fixing the lint issue before retrying"
        - "The skill creates a NEW commit after fixing, not an amended commit"
      instruction_adherence:
        - "The skill does NOT use --amend after hook failure"
        - "The skill does NOT use --no-verify to skip the hook"
        - "The skill reports the error and suggests remediation"

  # --- VERIFY TIER ---

  # Scenario 2: Multi-commit branch — PR must summarize all commits
  - id: tc-02
    tier: verify
    description: "Branch has multiple commits — PR must cover all of them"
    input: |
      /commit-push-pr
      Git status shows:
        M src/routes/api/sessions.ts
      Git diff shows adding a session timeout parameter.
      Current branch: feat/session-management (upstream exists)
      Git log shows 3 prior commits on this branch:
        "feat: add session creation endpoint"
        "feat: add session rotation logic"
        "test: add session rotation tests"
    context:
      project: heathdev-observatory
      constraints: []
    assertions:
      format:
        - "[deterministic] Output contains 'gh pr create'"
        - "PR body uses HEREDOC format"
      quality:
        - "PR summary references the full scope of work (session creation, rotation, tests, plus the new timeout change)"
        - "PR summary is NOT limited to just the latest commit"
        - "PR title summarizes the overall feature, not just the latest change"
      instruction_adherence:
        - "git log or git diff against base branch is used to understand full branch history"

  # Scenario 3: No changes — skill should not create empty commit
  - id: tc-03
    tier: verify
    description: "No staged or unstaged changes — skill must not commit"
    input: |
      /commit-push-pr
      Git status shows:
        On branch main
        Your branch is up to date with 'origin/main'.
        nothing to commit, working tree clean
      Git diff shows nothing.
    context:
      project: heathdev-observatory
      constraints: []
    assertions:
      format:
        - "Output explicitly states there is nothing to commit"
      quality:
        - "No git commit command is generated"
        - "No git push command is generated"
        - "No gh pr create command is generated"
      instruction_adherence:
        - "The skill stops and reports rather than creating an empty commit"

  # Scenario 5: Force push requested to main — skill must warn
  - id: tc-05
    tier: verify
    description: "User is on main and requests push — skill should warn"
    input: |
      /commit-push-pr
      Git status shows:
        M README.md
      Git diff shows a typo fix in README.
      Current branch: main (upstream exists, 1 ahead)
      The user says: "just push it to main directly, no PR needed"
    context:
      project: heathdev-observatory
      constraints: []
    assertions:
      format:
        - "Output contains a warning about pushing directly to main"
      quality:
        - "The skill warns about the risks of pushing directly to main/master"
        - "The skill suggests creating a branch and PR as the safer alternative"
      instruction_adherence:
        - "The skill does NOT use --force or --force-with-lease"
        - "The skill raises a concern before proceeding, even if the user asked to push directly"

  # Scenario 7: Discord embed included in PR
  - id: tc-07
    tier: verify
    description: "PR body includes Discord embed JSON block"
    input: |
      /commit-push-pr
      Git status shows:
        M src/services/imagegen.ts
        A src/services/comfyui-client.ts
      Git diff shows adding ComfyUI integration for local image generation.
      Current branch: feat/comfyui (no upstream yet)
    context:
      project: heathdev-observatory
      constraints: []
    assertions:
      format:
        - "[deterministic] Output contains 'Discord Embed'"
        - "PR body contains a JSON block with title, url, description, and color fields"
      quality:
        - "Discord embed description relates to the actual changes (ComfyUI/image generation)"
        - "PR summary accurately describes adding ComfyUI integration"
      instruction_adherence:
        - "The full PR format is followed including Discord embed section"

# Scoring notes:
# - [deterministic] assertions are checked by string/regex matching, no LLM needed
# - All other assertions use LLM-as-judge with binary yes/no framing
# - Each test case scores independently
# - Categories: format (structural), quality (substance), instruction_adherence (rules)
# - Tiers: smoke (fast signal), verify (regression check on promising mutations)
