      constraints: []
    assertions:
      format:
        - "Output is concise — not more than a few paragraphs"
      quality:
        - "The explanation correctly identifies this as a clamp/bound function"
        - "The explanation is proportionally brief — no multi-section deep dive for a one-liner"
        - "The skill does NOT generate a Mermaid diagram for trivial code"
      instruction_adherence:
        - "The skill skips the obvious per its principles"
        - "Complexity analysis is either omitted or noted as O(1) briefly"

