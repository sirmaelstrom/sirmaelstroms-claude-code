# Eval Suite: code-explain
# Tests whether the skill produces correct explanations: layered depth,
# diagrams, complexity analysis, pattern identification, and audience matching.
#
# Tiers:
#   smoke  — run every iteration for fast signal (3 cases)
#   verify — run only when smoke improves (3-4 cases)

skill: code-explain
created_at: "2026-04-29T05:00:00Z"
model: sonnet
iterations: 10
timeout_per_iteration_minutes: 10

test_cases:
  # --- SMOKE TIER ---

  # Scenario 1: "What does this do?" — high-level overview
  - id: tc-01
    tier: smoke
    description: "Simple function — user asks what it does, expects overview"
    input: |
      /code-explain
      What does this do?

      ```typescript
      export async function rotateSession(
        db: DatabaseSync,
        channelId: string,
        maxMessages: number = 50
      ): Promise<string> {
        const current = db.prepare(
          'SELECT id, message_count FROM sessions WHERE channel_id = ? AND active = 1'
        ).get(channelId);

        if (current && current.message_count < maxMessages) {
          return current.id;
        }

        if (current) {
          db.prepare('UPDATE sessions SET active = 0, ended_at = ? WHERE id = ?')
            .run(new Date().toISOString(), current.id);
        }

        const newId = crypto.randomUUID();
        db.prepare(
          'INSERT INTO sessions (id, channel_id, active, started_at, message_count) VALUES (?, ?, 1, ?, 0)'
        ).run(newId, channelId, new Date().toISOString());

        return newId;
      }
      ```
    context:
      project: heathdev-observatory
      constraints: []
    assertions:
      format:
        - "Output contains an overview section explaining the function's purpose"
        - "Output is structured with clear sections or headings"
      quality:
        - "The explanation identifies this as a session rotation function"
        - "The explanation covers the three paths: reuse current, rotate, or create new"
        - "The explanation does NOT over-explain obvious syntax like variable declarations"
      instruction_adherence:
        - "The depth matches 'what does this do' — high-level, not line-by-line"
        - "The output follows the skill's output structure (Overview first)"

  # Scenario 2: "Walk me through this" — step-by-step execution flow
  - id: tc-02
    tier: smoke
    description: "Complex algorithm — user asks for a walkthrough"
    input: |
      /code-explain
      Walk me through this debounce implementation:

      ```typescript
      function debounce<T extends (...args: any[]) => any>(
        fn: T,
        delay: number,
        options: { leading?: boolean; maxWait?: number } = {}
      ): (...args: Parameters<T>) => void {
        let timeoutId: ReturnType<typeof setTimeout> | null = null;
        let lastCallTime: number | null = null;
        let lastInvokeTime = 0;

        function invoke(args: Parameters<T>) {
          lastInvokeTime = Date.now();
          fn(...args);
        }

        return function (...args: Parameters<T>) {
          const now = Date.now();
          const isFirstCall = lastCallTime === null;
          lastCallTime = now;

          if (options.leading && isFirstCall) {
            invoke(args);
          }

          if (timeoutId !== null) {
            clearTimeout(timeoutId);
          }

          if (options.maxWait && now - lastInvokeTime >= options.maxWait) {
            invoke(args);
          } else {
            timeoutId = setTimeout(() => {
              if (!options.leading || !isFirstCall) {
                invoke(args);
              }
              timeoutId = null;
              lastCallTime = null;
            }, delay);
          }
        };
      }
      ```
    context:
      project: heathdev-observatory
      constraints: []
    assertions:
      format:
        - "Output walks through execution flow step by step"
        - "Output contains a diagram (Mermaid flowchart or sequence diagram)"
      quality:
        - "The walkthrough explains the leading edge option behavior"
        - "The walkthrough explains the maxWait option behavior"
        - "The walkthrough traces what happens on repeated calls within the delay window"
        - "Concrete examples with sample data are used to illustrate timing"
      instruction_adherence:
        - "The depth matches 'walk me through' — step-by-step, not just overview"
        - "The explanation covers the non-obvious parts (closure state, timer management)"

