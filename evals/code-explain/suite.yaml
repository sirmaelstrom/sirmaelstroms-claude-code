  # Scenario 4: "How does this work?" — deep dive with complexity analysis
  - id: tc-04
    tier: verify
    description: "Complex data structure — user wants deep understanding"
    input: |
      /code-explain
      How does this work?

      ```python
      class LRUCache:
          def __init__(self, capacity: int):
              self.capacity = capacity
              self.cache = {}
              self.head = Node(0, 0)
              self.tail = Node(0, 0)
              self.head.next = self.tail
              self.tail.prev = self.head

          def get(self, key: int) -> int:
              if key in self.cache:
                  node = self.cache[key]
                  self._remove(node)
                  self._add(node)
                  return node.val
              return -1

          def put(self, key: int, value: int) -> None:
              if key in self.cache:
                  self._remove(self.cache[key])
              node = Node(key, value)
              self._add(node)
              self.cache[key] = node
              if len(self.cache) > self.capacity:
                  lru = self.head.next
                  self._remove(lru)
                  del self.cache[lru.key]

          def _remove(self, node):
              node.prev.next = node.next
              node.next.prev = node.prev

          def _add(self, node):
              prev = self.tail.prev
              prev.next = node
              node.prev = prev
              node.next = self.tail
              self.tail.prev = node
      ```
    context:
      project: heathdev-observatory
      constraints: []
    assertions:
      format:
        - "Output contains a complexity analysis section (Big O)"
        - "Output contains a diagram illustrating the doubly-linked list structure"
      quality:
        - "The explanation identifies this as an LRU cache using a hash map + doubly-linked list"
        - "Big O analysis correctly states O(1) for both get and put operations"
        - "The explanation covers why a doubly-linked list is needed (O(1) removal)"
        - "The design pattern (combining two data structures for complementary strengths) is identified"
      instruction_adherence:
        - "The depth matches 'how does this work' — deep dive with trade-offs"
        - "The output includes the Patterns section per the skill spec"

  # Scenario 5: Concerns and edge cases
  - id: tc-05
    tier: verify
    description: "Code with subtle bugs — skill should surface concerns"
    input: |
      /code-explain
      Explain this rate limiter:

      ```typescript
      class RateLimiter {
        private tokens: number;
        private lastRefill: number;

        constructor(
          private maxTokens: number,
          private refillRate: number // tokens per second
        ) {
          this.tokens = maxTokens;
          this.lastRefill = Date.now();
        }

        tryConsume(cost: number = 1): boolean {
          this.refill();
          if (this.tokens >= cost) {
            this.tokens -= cost;
            return true;
          }
          return false;
        }

        private refill() {
          const now = Date.now();
          const elapsed = (now - this.lastRefill) / 1000;
          this.tokens = Math.min(
            this.maxTokens,
            this.tokens + elapsed * this.refillRate
          );
          this.lastRefill = now;
        }
      }
      ```
    context:
      project: heathdev-observatory
      constraints: []
    assertions:
      format:
        - "Output contains a concerns or potential issues section"
      quality:
        - "The explanation identifies this as a token bucket rate limiter"
        - "Thread safety / concurrency concerns are raised (no synchronization)"
        - "The floating-point token accumulation is noted as a potential precision issue"
      instruction_adherence:
        - "The Concerns section is included per the skill spec"
        - "The explanation focuses on understanding, not criticism"

  # Scenario 6: Simple code — don't over-explain
  - id: tc-06
    tier: verify
    description: "Trivial utility — skill should be proportionally brief"
    input: |
